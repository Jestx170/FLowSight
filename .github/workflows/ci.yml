name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      # The current unit tests cover HeatMapEngine, which only needs numpy +
      # OpenCV (headless in CI) — not the full ultralytics/torch stack. Install
      # the minimal set so CI stays fast; expand if tests start exercising the
      # detection engine.
      - name: Install test deps
        run: pip install pytest numpy "opencv-python-headless>=4.8.0"
      - name: Run tests
        working-directory: backend
        run: python -m pytest

  frontend:
    name: Frontend typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      # tsc is the gate that would have caught the broken react-chartjs-2 /
      # react-hook-form types; `vite build` does not typecheck on its own.
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
